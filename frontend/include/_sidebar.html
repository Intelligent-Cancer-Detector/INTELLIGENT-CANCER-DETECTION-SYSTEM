<script>
    async function syncSidebarRegistry() {
        const hospId = localStorage.getItem("icds_hospital_id");
        
        // These come from the login session
        document.getElementById('sideDocName').textContent = localStorage.getItem("icds_user_name") || "Medical Staff";
        document.getElementById('sideDocEmail').textContent = localStorage.getItem("icds_user_email") || "staff@hosp.com";

        if (!hospId) return;

        try {
            // Fetch the "Original" registered name from your database
            const response = await fetch(`http://localhost:5000/api/hospitals/${hospId}`);
            const data = await response.json();

            if (data.success) {
                document.getElementById('sideHospName').textContent = data.hospital.name;
            }
        } catch (e) {
            console.log("Offline mode - using session cache");
            document.getElementById('sideHospName').textContent = localStorage.getItem("icds_hospital_name");
        }
    }

    function handleLogout() {
        localStorage.clear();
        window.location.href = "login.html";
    }

    document.addEventListener('DOMContentLoaded', syncSidebarRegistry);
</script>
